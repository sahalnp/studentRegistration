<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign Up Page</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .toast {
                position: fixed;
                top: 20px;
                right: 20px;
                background: #2563eb;
                color: white;
                padding: 14px 20px;
                margin-top: 10px;
                border-radius: 8px;
                animation: fadeInOut 3s ease forwards;
            }
            .toast.error {
                background: #ef4444;
            }
            .toast.success {
                background: #10b981;
            }
            @keyframes fadeInOut {
                0% {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                10% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    opacity: 0;
                    transform: translateY(-20px);
                }
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .container {
                width: 100%;
                max-width: 440px;
                background: white;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
                padding: 48px;
                animation: slideUp 0.4s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .header {
                text-align: center;
                margin-bottom: 32px;
            }

            .title {
                font-size: 28px;
                font-weight: 600;
                color: #1f2937;
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 14px;
                color: #9ca3af;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-label {
                display: block;
                font-size: 14px;
                font-weight: 500;
                color: #374151;
                margin-bottom: 8px;
            }

            .input-wrapper {
                position: relative;
            }

            .input-icon {
                position: absolute;
                left: 16px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                color: #9ca3af;
                transition: color 0.2s;
            }

            .form-input {
                width: 100%;
                height: 48px;
                padding: 12px 16px 12px 44px;
                border: 1px solid #e5e7eb;
                border-radius: 8px;
                font-size: 15px;
                color: #1f2937;
                transition: all 0.2s;
                outline: none;
            }

            .form-input:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            }

            .form-input:focus + .input-icon {
                color: #2563eb;
            }

            .form-input.error {
                border-color: #ef4444;
                animation: shake 0.4s;
            }

            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                25% {
                    transform: translateX(-5px);
                }
                75% {
                    transform: translateX(5px);
                }
            }

            .password-toggle {
                position: absolute;
                right: 16px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                color: #9ca3af;
                transition: color 0.2s;
                padding: 4px;
            }

            .password-toggle:hover {
                color: #2563eb;
            }

            .error-message {
                display: none;
                color: #ef4444;
                font-size: 13px;
                margin-top: 6px;
                animation: slideDown 0.2s ease;
            }

            .error-message.show {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-5px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .checkbox-wrapper {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .checkbox {
                width: 18px;
                height: 18px;
                cursor: pointer;
                accent-color: #2563eb;
            }

            .checkbox-label {
                font-size: 14px;
                color: #374151;
                cursor: pointer;
            }

            .link {
                font-size: 14px;
                color: #2563eb;
                text-decoration: none;
                transition: text-decoration 0.2s;
            }

            .link:hover {
                text-decoration: underline;
            }

            .submit-button {
                width: 100%;
                height: 48px;
                background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s;
                margin-bottom: 20px;
            }

            .submit-button:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
            }

            .submit-button:active {
                transform: translateY(0);
            }

            .submit-button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .form-footer {
                text-align: center;
                font-size: 14px;
                color: #6b7280;
            }

            @media (max-width: 768px) {
                .container {
                    padding: 32px;
                }
            }

            @media (max-width: 480px) {
                .container {
                    padding: 24px;
                }

                .title {
                    font-size: 24px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1 class="title">Create account</h1>
                <p class="subtitle">Sign up to get started</p>
            </div>

            <form
                id="signupForm"
                method="POST"
                action="{% url 'user_signup' %}"
            >
                {% csrf_token %}

                <div class="form-group">
                    <label for="signupUsername" class="form-label"
                        >Username</label
                    >
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="signupUsername"
                            name="username"
                            class="form-input"
                            placeholder="Choose a username"
                        />

                        <svg
                            class="input-icon"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                            ></path>
                        </svg>
                    </div>
                    <div
                        class="error-message"
                        id="signupUsernameError"
                        role="alert"
                    ></div>
                </div>

                <div class="form-group">
                    <label for="signupEmail" class="form-label">Email</label>
                    <div class="input-wrapper">
                        <input
                            type="email"
                            id="signupEmail"
                            name="email"
                            class="form-input"
                            placeholder="Enter your email"
                        />

                        <svg
                            class="input-icon"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                            ></path>
                        </svg>
                    </div>
                    <div
                        class="error-message"
                        id="signupEmailError"
                        role="alert"
                    ></div>
                </div>
                <div class="form-group">
    <label class="form-label">Phone Number</label>
    <div class="input-wrapper" style="display: flex; gap: 10px">
        <input 
            type="text"
            name="country_code"
            id="countryCode"
            class="form-input"
            placeholder="+91"
            style="max-width: 100px; padding-left: 16px;"
        />

        <input 
            type="text"
            name="phone"
            id="signupPhone"
            class="form-input"
            placeholder="Enter phone number"
            style="flex: 1;"
            max="10"
        />
    </div>
    <div class="error-message" id="signupPhoneError"></div>
</div>


                <div class="form-group">
                    <label for="signupPassword" class="form-label"
                        >Password</label
                    >
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="signupPassword"
                            name="password"
                            class="form-input"
                            placeholder="Create a password"
                        />

                        <svg
                            class="input-icon"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                            ></path>
                        </svg>
                        <button
                            type="button"
                            class="password-toggle"
                            onclick="togglePassword('signupPassword')"
                            aria-label="Toggle password visibility"
                        >
                            <svg
                                width="20"
                                height="20"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                ></path>
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                ></path>
                            </svg>
                        </button>
                    </div>
                    
                    <div
                        class="error-message"
                        id="signupPasswordError"
                        role="alert"
                    ></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label"
                        >Confirm Password</label
                    >
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirm_password"
                            class="form-input"
                            placeholder="Confirm your password"
                        />

                        <svg
                            class="input-icon"
                            fill="none"
                            stroke="currentColor"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                            ></path>
                        </svg>
                        <button
                            type="button"
                            class="password-toggle"
                            onclick="togglePassword('confirmPassword')"
                            aria-label="Toggle password visibility"
                        >
                            <svg
                                width="20"
                                height="20"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                ></path>
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                ></path>
                            </svg>
                        </button>
                    </div>
                    <div
                        class="error-message"
                        id="confirmPasswordError"
                        role="alert"
                    ></div>
                </div>

                <div class="form-group">
                    <div class="checkbox-wrapper">
                        <input
                            type="checkbox"
                            id="terms"
                            class="checkbox"
                            aria-required="true"
                        />
                        <label for="terms" class="checkbox-label"
                            >I agree to the
                            <a href="#" class="link"
                                >Terms & Conditions</a
                            ></label
                        >
                    </div>
                    <div
                        class="error-message"
                        id="termsError"
                        role="alert"
                    ></div>
                </div>

                <button type="submit" class="submit-button">Sign Up</button>

                <div class="form-footer">
                    Already have an account?
                    <a href="/account/login" class="link">Log in</a>
                </div>
            </form>
        </div>

        <script>
            // Toggle Password Visibility
            function togglePassword(inputId) {
                const input = document.getElementById(inputId);
                const type = input.type === "password" ? "text" : "password";
                input.type = type;
            }

            // Validation Functions
            function showError(inputId, message) {
                const input = document.getElementById(inputId);
                const errorDiv = document.getElementById(inputId + "Error");

                input.classList.add("error");
                input.setAttribute("aria-invalid", "true");
                errorDiv.textContent = "⚠ " + message;
                errorDiv.classList.add("show");
            }

            function clearError(inputId) {
                const input = document.getElementById(inputId);
                const errorDiv = document.getElementById(inputId + "Error");

                input.classList.remove("error");
                input.setAttribute("aria-invalid", "false");
                errorDiv.classList.remove("show");
            }

            function validateEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email))
                    return "Please enter a valid email address";
                return null;
            }
        </script>
        {% if messages %}
        <div id="toast-container">
            {% for message in messages %}
            <div class="toast {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
    </body>
</html>
